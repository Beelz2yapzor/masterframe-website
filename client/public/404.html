<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Master Frame Industries</title>
    <script>
      // GitHub Pages workaround for client-side routing
      // Redirect 404s to the root index.html
      var segmentCount = 0;
      var l = window.location;
      l.replace(
        l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
        '/masterframe-website/?p=/' +
        l.pathname.slice(1).split('/').slice(segmentCount).join('/').replace(/&/g, '~and~') +
        (l.search ? '&q=' + l.search.slice(1).replace(/&/g, '~and~') : '') +
        l.hash
      );
    </script>
  </head>
  <body>
  </body>
</html>
